.team-select-btn.active { background: rgba(0,184,92,0.15); border-color: rgba(0,184,92,0.5); color: var(--green); }
/* Evolución en la tabla (mini chart) */

<script>
const CLUB_NAME = "Gimnasia y Esgrima";
const CLUB_ALIASES = ["GEBA","Gimnasia y Esgrima de Buenos Aires"];
const DIVISIONS = [{id:"primera-a",label:"Primera A",url:"data/urba-primera-a.json"},{id:"intermedia",label:"Intermedia",url:"data/primera-a-intermedia.json"},{id:"preinter-a",label:"Pre-Inter A",url:"data/primera-a-preinter-a.json"},{id:"preinter-b",label:"Pre-Inter B",url:"data/primera-a-preinter-b.json"},{id:"preinter-c",label:"Pre-Inter C",url:"data/primera-a-preinter-c.json"},{id:"preinter-d",label:"Pre-Inter D",url:"data/primera-a-preinter-d.json"}];
// páginas por división (para el botón "Ver tabla completa")
const DIV_PAGES = {
  "primera-a":  "primera-a.html",
  "intermedia": "primera-a-intermedia.html",
  "preinter-a": "primera-a-preintermedia-a.html",
  "preinter-b": "primera-a-preintermedia-b.html",
  "preinter-c": "primera-a-preintermedia-c.html",
  "preinter-d": "primera-a-preintermedia-d.html"
};
// mapeo de div id (tabs) → clave en PARTIDOS (data.js) para mostrar el plantel correcto
const DIV_TO_PARTIDOS = {
  "primera-a":  "primera_a",
  "intermedia": "primera_a",
  "preinter-a": "primera_a",
  "preinter-b": "primera_a",
  "preinter-c": "primera_a",
  "preinter-d": "primera_a"
};

// cache de datos por división
const divData = {};
const selectedTeam = {};
let activeDiv = "primera-a";

// ── NORMALIZACION Y MATCH ───────────────────────────────
function norm(str) {
  return (str || "")
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, ' ')
    .trim();
}

// matchea exacto, o "<club> <letra>" (Pre-Inter B/C/D/E/F/G/H)
// considera tanto el nombre principal como los aliases del club
function matchesClub(teamName) {
  const tn = norm(teamName);
  const candidates = [CLUB_NAME, ...CLUB_ALIASES];
  for (const alias of candidates) {
    const cn = norm(alias);
    if (tn === cn) return true;
    if (tn.startsWith(cn + ' ')) {
      const suffix = tn.slice(cn.length + 1);
      if (/^[a-z]$/.test(suffix)) return true;
    }
  }
  return false;
}

// el nombre del club tal como aparece en la división activa (ej: SIC, SIC B)
function teamNameInDiv(teams) {
  const hit = teams.find(t => matchesClub(t.name));
  return hit ? hit.name : null;
}
function teamsInDiv(teams) {
  return teams.filter(t => matchesClub(t.name));
}

// ── FETCH PARALELO DE TODAS LAS DIVISIONES ──────────────
function loadAllDivisions() {
  DIVISIONS.forEach(d => {
    fetch(d.url + '?v=' + Date.now())
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        divData[d.id] = data || { teams: [], matches: {} };
        updateTabState(d.id);
        if (d.id === activeDiv) renderDivision(activeDiv);
      })
      .catch(() => {
        divData[d.id] = { teams: [], matches: {} };
        updateTabState(d.id);
      });
  });
  // lastUpdate del top14
  fetch('data/urba-primera-a.json?v=' + Date.now())
    .then(r => r.json())
    .then(data => {
      if (data && data.lastUpdate) {
        const dd = new Date(data.lastUpdate);
        const el = document.getElementById('last-update');
        if (el) el.textContent = '✓ Actualizado: ' + dd.toLocaleString('es-AR', {day:'2-digit',month:'numeric',hour:'2-digit',minute:'2-digit'});
      }
    }).catch(() => {});
}

// ── TABS ────────────────────────────────────────────────
function renderTabs() {
  const el = document.getElementById('div-tabs');
  el.innerHTML = DIVISIONS.map(d =>
    `<button class="div-tab ${d.id===activeDiv?'active':''}" id="tab-${d.id}" onclick="setDivision('${d.id}')">${d.label}</button>`
  ).join('');
}
function updateTabState(id) {
  const btn = document.getElementById('tab-' + id);
  if (!btn) return;
  const data = divData[id];
  if (!data || !data.teams || !data.teams.length) {
    btn.classList.add('disabled');
    return;
  }
  const hasTeam = data.teams.some(t => matchesClub(t.name));
  if (!hasTeam) btn.classList.add('disabled');
  else          btn.classList.remove('disabled');
}
function setDivision(id) {
  const btn = document.getElementById('tab-' + id);
  if (btn && btn.classList.contains('disabled')) return;
  activeDiv = id;
  document.querySelectorAll('.div-tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderDivision(id);
  renderPlantel(id);
}
function selectTeam(divId, teamName) {
  selectedTeam[divId] = teamName;
  renderDivision(divId);
  renderPlantel(divId);
}

// ── RENDER DE UNA DIVISION ──────────────────────────────
function renderDivision(id) {
  const div = DIVISIONS.find(d => d.id === id);
  document.getElementById('pos-tit-div').textContent = div.label;
  const link = document.getElementById('see-full-link');
  link.href = DIV_PAGES[id] || 'top14.html';
  link.textContent = 'Ver tabla completa ' + div.label + ' →';

  const data = divData[id] || { teams: [], matches: {} };
  const teams   = data.teams   || [];
  const matches = data.matches || {};
  const matchingTeams = teamsInDiv(teams);
  if (!selectedTeam[id] || !matchingTeams.some(t => t.name === selectedTeam[id])) {
    selectedTeam[id] = matchingTeams.length ? matchingTeams[0].name : null;
  }
  const teamName = selectedTeam[id];

  const atn = document.getElementById('active-team-name');
  if (matchingTeams.length > 1) {
    atn.innerHTML = matchingTeams.map(t =>
      `<button class="team-select-btn ${t.name === teamName ? 'active' : ''}">${t.name}</button>`
    ).join('');
    atn.querySelectorAll('.team-select-btn').forEach((btn, i) => {
      btn.addEventListener('click', () => selectTeam(id, matchingTeams[i].name));
    });
  } else if (teamName && norm(teamName) !== norm(CLUB_NAME)) {
    atn.innerHTML = 'Equipo en esta división: <strong>' + teamName + '</strong>';
  } else {
    atn.textContent = '';
  }

  renderPosicion(teams, teamName);
  renderPosHistory(matches, teamName, teams);
  renderPartidos(matches, teamName);
}

// ── POSICION EN LA TABLA ─────────────────────────────────
function renderPosicion(teams, teamName) {
  const el = document.getElementById('pos-card');
  if (!teams.length) {
    el.innerHTML = '<div class="empty-state">Sin datos cargados para esta división.</div>';
    return;
  }
  if (!teamName) {
    el.innerHTML = '<div class="empty-state">' + CLUB_NAME + ' no participa en esta división.</div>';
    return;
  }
  const allZero = teams.every(t => (t.pts||0) === 0 && (t.pj||0) === 0);
  const sorted = [...teams].filter(t => t.name !== 'Bye').sort((a, b) => {
    if (allZero) return a.name.localeCompare(b.name, 'es');
    return (b.pts||0) - (a.pts||0) || ((b.pf||0)-(b.pc||0)) - ((a.pf||0)-(a.pc||0));
  });
  const idx = sorted.findIndex(t => t.name === teamName);
  if (idx === -1) {
    el.innerHTML = '<div class="empty-state">Sin posición registrada.</div>';
    return;
  }
  const t = sorted[idx];
  const pos = idx + 1;
  const diff = (t.pf || 0) - (t.pc || 0);
  const diffClass = diff > 0 ? 'green' : diff < 0 ? 'red' : '';
  const diffStr   = (diff > 0 ? '+' : '') + (diff || 0);
  const formDots  = (t.form || []).map(f =>
    '<div class="dot ' + (f === 'w' ? 'w' : f === 'l' ? 'l' : 'd') + '"></div>').join('');

  el.innerHTML = `
    <div class="pos-card">
      <div class="pos-pos-big">
        <div class="big">${allZero ? '—' : pos + '°'}</div>
        <div class="lbl">Posición</div>
      </div>
      <div class="pos-stat"><div class="pos-stat-label">Pts</div><div class="pos-stat-val green">${t.pts || 0}</div></div>
      <div class="pos-stat"><div class="pos-stat-label">PJ</div><div class="pos-stat-val">${t.pj || 0}</div></div>
      <div class="pos-stat"><div class="pos-stat-label">G</div><div class="pos-stat-val">${t.g || 0}</div></div>
      <div class="pos-stat"><div class="pos-stat-label">E</div><div class="pos-stat-val">${t.e || 0}</div></div>
      <div class="pos-stat"><div class="pos-stat-label">P</div><div class="pos-stat-val">${t.p || 0}</div></div>
      <div class="pos-stat"><div class="pos-stat-label">PF</div><div class="pos-stat-val">${t.pf || 0}</div></div>
      <div class="pos-stat"><div class="pos-stat-label">PC</div><div class="pos-stat-val">${t.pc || 0}</div></div>
      <div class="pos-stat"><div class="pos-stat-label">+/-</div><div class="pos-stat-val ${diffClass}">${diffStr}</div></div>
      <div class="pos-stat"><div class="pos-stat-label">BP</div><div class="pos-stat-val gold">${t.bp || 0}</div></div>
      <div class="pos-stat"><div class="pos-stat-label">BF</div><div class="pos-stat-val">${t.bf || 0}</div></div>
      <div class="pos-stat" style="min-width:90px">
        <div class="pos-stat-label">Forma</div>
        <div class="form-dots" style="justify-content:center;padding-top:4px">${formDots || '<span style="color:var(--muted);font-size:0.75rem">—</span>'}</div>
      </div>
    </div>`;
}

// ── PARTIDOS JUGADOS + PROXIMOS ─────────────────────────
function renderPartidos(matches, teamName) {
  const jugEl  = document.getElementById('partidos-jugados');
  const proxEl = document.getElementById('proximos-partidos');
  if (!teamName) {
    jugEl.innerHTML  = '<div class="empty-state">Sin datos de partidos para esta división.</div>';
    proxEl.innerHTML = '';
    return;
  }
  const jugados = [], proximos = [];
  Object.entries(matches).forEach(([rnd, rd]) => {
    (rd.ms || []).forEach(m => {
      const homeIsClub = m.home === teamName;
      const awayIsClub = m.away === teamName;
      if (!homeIsClub && !awayIsClub) return;
      if (m.home === 'Bye' || m.away === 'Bye') return;
      const rival     = homeIsClub ? m.away : m.home;
      const condicion = homeIsClub ? 'Local' : 'Visitante';
      if (m.played) {
        const ptsPropio = homeIsClub ? m.hs : m.as;
        const ptsRival  = homeIsClub ? m.as : m.hs;
        const res = ptsPropio > ptsRival ? 'w' : ptsPropio < ptsRival ? 'l' : 'd';
        jugados.push({ rnd: +rnd, rival, condicion, ptsPropio, ptsRival, res, date: rd.date });
      } else {
        proximos.push({ rnd: +rnd, rival, condicion, date: rd.date });
      }
    });
  });
  jugados.sort((a, b) => a.rnd - b.rnd);
  proximos.sort((a, b) => a.rnd - b.rnd);

  if (!jugados.length) {
    jugEl.innerHTML = '<div class="empty-state">Sin partidos jugados aún.</div>';
  } else {
    jugEl.innerHTML = jugados.slice(-5).reverse().map(p => {
      const resLetter = p.res === 'w' ? 'G' : p.res === 'l' ? 'P' : 'E';
      return `<div class="match-row">
        <div class="match-row-left">
          <div class="match-result ${p.res}">${resLetter}</div>
          <div class="match-rival"><span class="cond">${p.condicion}</span>vs <strong>${p.rival}</strong></div>
        </div>
        <div class="match-score">${p.ptsPropio} — ${p.ptsRival}</div>
        <div class="match-fecha">F${p.rnd}${p.date ? ' · ' + p.date : ''}</div>
      </div>`;
    }).join('');
  }

  if (!proximos.length) {
    proxEl.innerHTML = '<div class="empty-state">No hay próximos partidos cargados.</div>';
  } else {
    proxEl.innerHTML = proximos.slice(0, 5).map(p => `
      <div class="match-row">
        <div class="match-row-left">
          <div class="match-rival"><span class="cond">${p.condicion}</span>vs <strong>${p.rival}</strong></div>
        </div>
        <div class="match-score upcoming">VS</div>
        <div class="match-fecha">F${p.rnd}${p.date ? ' · ' + p.date : ''}</div>
      </div>`).join('');
  }
}

// ── EVOLUCIÓN DE POSICIÓN EN LA TABLA ───────────────────
// Rejuega el fixture fecha por fecha y calcula en qué puesto terminaba
// el club activo después de cada fecha. Usa el mismo orden que el card
// de "Posición" (pts desc, luego diff desc).
function computePosHistory(matches, teamName, seedTeams) {
  if (!teamName || !matches) return [];
  const stats = {};
  const touch = (name) => {
    if (!stats[name]) stats[name] = { name, pts: 0, pj: 0, pf: 0, pc: 0 };
    return stats[name];
  };
  (seedTeams || []).forEach(t => touch(t.name));

  const fechas = Object.keys(matches).map(Number).filter(n => !isNaN(n)).sort((a, b) => a - b);
  const history = [];
  for (const fecha of fechas) {
    const rd = matches[fecha] || {};
    let anyPlayed = false;
    (rd.ms || []).forEach(m => {
      if (!m.played) return;
      if (m.home === 'Bye' || m.away === 'Bye') return;
      anyPlayed = true;
      const h = touch(m.home), a = touch(m.away);
      const hs = +m.hs || 0, as = +m.as || 0;
      h.pj++; a.pj++;
      h.pf += hs; h.pc += as;
      a.pf += as; a.pc += hs;
      if (hs > as)      { h.pts += 4; }
      else if (hs < as) { a.pts += 4; }
      else              { h.pts += 2; a.pts += 2; }
      if (m.bp_home) h.pts += 1;
      if (m.bp_away) a.pts += 1;
      if (m.bf_home) h.pts += 1;
      if (m.bf_away) a.pts += 1;
    });
    if (!anyPlayed) continue;
    const list = Object.values(stats).filter(t => t.pj > 0);
    list.sort((a, b) =>
      (b.pts - a.pts) ||
      ((b.pf - b.pc) - (a.pf - a.pc)) ||
      (b.pf - a.pf)
    );
    const idx = list.findIndex(t => t.name === teamName);
    if (idx >= 0) {
      history.push({ fecha, pos: idx + 1, total: list.length, pts: list[idx].pts });
    }
  }
  return history;
}

function renderPosHistory(matches, teamName, seedTeams) {
  const el = document.getElementById('pos-history');
  if (!el) return;
  if (!teamName) {
    el.innerHTML = '<div class="empty-state">' + CLUB_NAME + ' no participa en esta división.</div>';
    return;
  }
  const hist = computePosHistory(matches, teamName, seedTeams);
  if (hist.length < 1) {
    el.innerHTML = '<div class="empty-state">Aún no hay fechas jugadas en esta división.</div>';
    return;
  }

  // SVG chart (1° arriba, última posición abajo).
  const W = 600, H = 160;
  const padL = 36, padR = 14, padT = 18, padB = 30;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const totalTeams = Math.max(...hist.map(p => p.total), 2);
  const maxFecha = Math.max(...hist.map(p => p.fecha));
  const minFecha = Math.min(...hist.map(p => p.fecha));
  const spanF = Math.max(1, maxFecha - minFecha);
  const xAt = f => padL + (hist.length === 1 ? innerW / 2 : (f - minFecha) / spanF * innerW);
  const yAt = p => padT + (totalTeams <= 1 ? innerH / 2 : (p - 1) / (totalTeams - 1) * innerH);

  // Ejes guía: puestos 1, medio y último.
  const axisPositions = [1];
  if (totalTeams >= 4) axisPositions.push(Math.ceil(totalTeams / 2));
  if (totalTeams >= 2) axisPositions.push(totalTeams);
  const axis = axisPositions.map(p => `
      <line class="pos-grid" x1="${padL}" y1="${yAt(p)}" x2="${W - padR}" y2="${yAt(p)}"/>
      <text class="pos-num-lbl" x="${padL - 6}" y="${yAt(p) + 4}" text-anchor="end">${p}°</text>
    `).join('');

  const points = hist.map(pt => `${xAt(pt.fecha)},${yAt(pt.pos)}`).join(' ');
  const dots = hist.map(pt => `
      <g>
        <circle class="pos-dot" cx="${xAt(pt.fecha)}" cy="${yAt(pt.pos)}" r="4.5"/>
        <text class="pos-num-lbl" x="${xAt(pt.fecha)}" y="${yAt(pt.pos) - 9}" text-anchor="middle">${pt.pos}°</text>
        <text class="pos-fecha-lbl" x="${xAt(pt.fecha)}" y="${H - 10}" text-anchor="middle">F${pt.fecha}</text>
      </g>
    `).join('');

  const first = hist[0], last = hist[hist.length - 1];
  const delta = first.pos - last.pos;     // +: mejoró, -: empeoró
  const deltaTxt = delta === 0
    ? 'Se mantuvo en ' + last.pos + '°'
    : (delta > 0 ? 'Subió ' + delta + ' puesto' + (delta > 1 ? 's' : '')
                 : 'Bajó ' + (-delta) + ' puesto' + (-delta > 1 ? 's' : ''));

  el.innerHTML = `
    <div class="pos-history-wrap">
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" role="img"
           aria-label="Evolución de la posición del club por fecha">
        ${axis}
        <polyline class="pos-line" points="${points}"/>
        ${dots}
      </svg>
      <div class="pos-sub">
        <span>De <strong>${first.pos}°</strong> (F${first.fecha}) a <strong>${last.pos}°</strong> (F${last.fecha})</span>
        <span>${deltaTxt}</span>
      </div>
    </div>
  `;
}

// ── PLANTEL (desde data.js PARTIDOS.top14) ──────────────
// Deduplicación robusta: tildes, abreviaciones, apellidos compuestos,
// mayúsculas como marcador de apellido, detección de inicial al inicio o
// al final, y distancia de Levenshtein para tolerar tipeos puntuales.
// Además, por cada jugador se muestran las fechas en que estuvo en el
// equipo titular (usando el fixture JSON cargado, filtrado por
// partidos `played === true`).
const _PLANTEL_STOP = new Set(['de','del','la','las','los','y','san','santa','da','do','le']);
function _plantelLev(a, b) {
  if (a === b) return 0;
  const al = a.length, bl = b.length;
  if (!al) return bl;
  if (!bl) return al;
  const dp = new Array(bl + 1);
  for (let j = 0; j <= bl; j++) dp[j] = j;
  for (let i = 1; i <= al; i++) {
    let prev = dp[0];
    dp[0] = i;
    for (let j = 1; j <= bl; j++) {
      const tmp = dp[j];
      dp[j] = a[i-1] === b[j-1]
        ? prev
        : 1 + Math.min(prev, dp[j], dp[j-1]);
      prev = tmp;
    }
  }
  return dp[bl];
}
function _plantelStripAccents(s) {
  return (s || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}
function _plantelLowerTxt(s) {
  return _plantelStripAccents(s || '').toLowerCase().replace(/\s+/g, ' ').trim();
}
function _plantelIsInitialTok(t) {
  // Una sola letra ("F") o 2-3 letras todas mayúsculas ("JC", "JCM").
  if (!t) return false;
  if (t.length === 1) return true;
  if (t.length >= 2 && t.length <= 3 && /^[A-ZÑ]+$/.test(t)) return true;
  return false;
}
function _plantelExpandInitials(t) {
  // "JC" → "j c"; "F" → "f"
  return t.toLowerCase().split('').join(' ');
}
function _plantelParseName(raw) {
  // Limpieza previa (preservamos mayúsculas para detectar formato).
  let s = _plantelStripAccents(raw || '')
    .replace(/\(\s*(c|vc|vcap|cap|capitan|capitán|C|VC|Cap|VCap)\s*\)/gi, '')
    .replace(/[().]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
  let last = '', first = '';
  if (s.includes(',')) {
    const parts = s.split(',');
    last  = (parts[0] || '').trim();
    first = (parts.slice(1).join(',') || '').trim();
  } else {
    const raw_tokens = s.split(/\s+/).filter(Boolean);
    if (!raw_tokens.length) {
      last = ''; first = '';
    } else if (raw_tokens.length === 1) {
      last = raw_tokens[0]; first = '';
    } else if (_plantelIsInitialTok(raw_tokens[raw_tokens.length - 1])) {
      // "Gomez Cruz F", "Noel I", "G. Chiappe I", "Bergallo JC"
      // → preferimos trailing-initial (caso más frecuente)
      first = _plantelExpandInitials(raw_tokens[raw_tokens.length - 1]);
      last  = raw_tokens.slice(0, -1).join(' ');
    } else if (_plantelIsInitialTok(raw_tokens[0])) {
      // "F Gomez Cruz", "JC Bergallo"
      first = _plantelExpandInitials(raw_tokens[0]);
      last  = raw_tokens.slice(1).join(' ');
    } else {
      // Detectar ALL-CAPS (≥ 4 letras) como apellido explícito.
      const upperMask    = raw_tokens.map(t => t.length >= 4 && /^[A-ZÑ]+$/.test(t));
      const upperIdxs    = upperMask.map((v,i) => v ? i : -1).filter(i => i >= 0);
      const nonUpperIdxs = upperMask.map((v,i) => !v && raw_tokens[i].length >= 2 ? i : -1).filter(i => i >= 0);
      if (upperIdxs.length && nonUpperIdxs.length) {
        last  = upperIdxs.map(i => raw_tokens[i]).join(' ');
        first = nonUpperIdxs.map(i => raw_tokens[i]).join(' ');
      } else {
        // Fallback: último token = apellido simple, resto = nombre (cubre
        // "Ignacio Donmanovich" sin mayúsculas).
        first = raw_tokens.slice(0, -1).join(' ');
        last  = raw_tokens[raw_tokens.length - 1];
      }
    }
  }
  last  = _plantelLowerTxt(last);
  first = _plantelLowerTxt(first);
  const allTok = last.split(/[^a-z0-9]+/).filter(Boolean);
  const distinctive = allTok.filter(t => !_PLANTEL_STOP.has(t));
  const lastTokens = new Set(distinctive.length ? distinctive : allTok);
  return {
    lastTokens,
    firstInitial: first.charAt(0) || '',
    firstFull: first,
  };
}
function _plantelTokensSim(a, b) {
  if (a === b) return true;
  if (a.length < 4 || b.length < 4) return false;
  if (Math.abs(a.length - b.length) > 2) return false;
  const maxL = Math.max(a.length, b.length);
  const limit = maxL >= 6 ? 2 : 1;
  return _plantelLev(a, b) <= limit;
}
function _plantelFirstsOk(fa, fb) {
  if (!fa || !fb) return true;
  if (fa.length <= 1 || fb.length <= 1) return fa.charAt(0) === fb.charAt(0);
  if (fa === fb) return true;
  if (fa.startsWith(fb) || fb.startsWith(fa)) return true;
  // Igualdad sin espacios: "j c" vs "jc"
  const sa = fa.replace(/\s+/g, ''), sb = fb.replace(/\s+/g, '');
  if (sa === sb) return true;
  if (sa.startsWith(sb) || sb.startsWith(sa)) return true;
  const L = Math.max(fa.length, fb.length);
  if (_plantelLev(fa, fb) <= (L >= 7 ? 2 : 1)) return true;
  const LS = Math.max(sa.length, sb.length);
  return _plantelLev(sa, sb) <= (LS >= 7 ? 2 : 1);
}
function _plantelSameGroup(np, g) {
  const a = [...np.lastTokens], b = [...g.lastTokensUnion];
  if (!a.length || !b.length) return false;

  // 1. Orientación normal: np.last ↔ g.last, np.first ↔ g.first
  const normInitOk = !(np.firstInitial && g.firstInitial && np.firstInitial !== g.firstInitial);
  if (normInitOk && _plantelFirstsOk(np.firstFull, g.firstFull)) {
    for (const ta of a) for (const tb of b) {
      if (_plantelTokensSim(ta, tb)) return true;
    }
  }

  // 2. Orientación invertida: maneja "Apellido Nombre" sin coma (interpretado al revés).
  // Cuando np fue parseado como last=Nombre, first=Apellido por error de formato.
  const altLast = np.firstFull.split(/[^a-z0-9]+/).filter(t => t.length >= 2 && !_PLANTEL_STOP.has(t));
  if (!altLast.length) return false;
  const altFirst = a.filter(t => !_PLANTEL_STOP.has(t)).join(' ');
  const altInit  = altFirst.charAt(0) || '';
  if (altInit && g.firstInitial && altInit !== g.firstInitial) return false;
  if (!_plantelFirstsOk(altFirst, g.firstFull)) return false;
  for (const ta of altLast) for (const tb of b) {
    if (_plantelTokensSim(ta, tb)) return true;
  }
  return false;
}

function renderPlantel(divId) {
  divId = divId || activeDiv || 'top14';
  const el = document.getElementById('plantel');
  const divInfo = DIVISIONS.find(d => d.id === divId) || DIVISIONS[0];
  const labelEl = document.getElementById('plantel-div-label');
  if (labelEl) labelEl.textContent = '· ' + divInfo.label.toUpperCase();
  const partidosKey = DIV_TO_PARTIDOS[divId] || 'top14';
  if (typeof PARTIDOS === 'undefined' || !PARTIDOS[partidosKey]) {
    el.innerHTML = '<div class="empty-state">Sin formaciones cargadas para ' + divInfo.label + '.</div>';
    return;
  }

  // Lookup partido → fecha: sólo matches ya jugados (played:true) y si hay
  // varios (ida+vuelta) preservamos la fecha más temprana.
  const fxData = divData[divId] || {};
  const fechaLookup = {};
  Object.entries(fxData.matches || {}).forEach(([rnd, rd]) => {
    (rd.ms || []).forEach(m => {
      if (!m.played) return;
      const r = +rnd;
      const k1 = norm(m.home) + '||' + norm(m.away);
      const k2 = norm(m.away) + '||' + norm(m.home);
      if (!(k1 in fechaLookup) || fechaLookup[k1] > r) fechaLookup[k1] = r;
      if (!(k2 in fechaLookup) || fechaLookup[k2] > r) fechaLookup[k2] = r;
    });
  });

  // Recolecta jugadores deduplicados con el conjunto de fechas jugadas.
  const groups = [];
  Object.values(PARTIDOS[partidosKey]).forEach(partido => {
    let fecha = null;
    if (partido.local && partido.visitante) {
      const k = norm(partido.local.nombre) + '||' + norm(partido.visitante.nombre);
      fecha = fechaLookup[k] || null;
    }
    ['local', 'visitante'].forEach(side => {
      const team = partido[side];
      if (!team || !matchesClub(team.nombre)) return;
      (team.jugadores || []).forEach(j => {
        const m = j.match(/^(\d+)\.\s*(.+)/);
        if (!m) return;
        const pos  = parseInt(m[1], 10);
        const name = m[2].trim();
        const np   = _plantelParseName(name);

        let target = null;
        for (const g of groups) {
          if (_plantelSameGroup(np, g)) { target = g; break; }
        }
        if (!target) {
          target = {
            lastTokensUnion: new Set(np.lastTokens),
            firstInitial: np.firstInitial,
            firstFull: np.firstFull,
            pos, display: name,
            fechas: new Set(),
            lastFecha: fecha || 0,
          };
          groups.push(target);
        } else {
          np.lastTokens.forEach(t => target.lastTokensUnion.add(t));
          if (np.firstFull.length > target.firstFull.length) target.firstFull = np.firstFull;
          if (!target.firstInitial && np.firstInitial) target.firstInitial = np.firstInitial;
          if (name.length > target.display.length) target.display = name;
          if (fecha && fecha >= target.lastFecha) {
            target.pos = pos;
            target.lastFecha = fecha;
          }
        }
        if (fecha) target.fechas.add(fecha);
      });
    });
  });

  if (!groups.length) {
    el.innerHTML = '<div class="empty-state">Sin jugadores registrados para ' + CLUB_NAME + ' en ' + divInfo.label + ' este 2026.</div>';
    return;
  }

  groups.sort((a, b) => (a.pos - b.pos) || a.display.localeCompare(b.display));

  const rows = groups.map(p => {
    const fechas = Array.from(p.fechas).sort((a, b) => a - b);
    const fechasHtml = fechas.length
      ? '<span class="plantel-fechas">' +
          fechas.map(f => `<span class="plantel-fecha">F${f}</span>`).join('') +
        '</span>'
      : '';
    return `<div class="plantel-row">`
         + `<span class="plantel-num">${p.pos}</span>`
         + `<span class="plantel-name">${p.display}</span>`
         + fechasHtml
         + `</div>`;
  }).join('');

  el.innerHTML = '<div class="plantel-grid">' + rows + '</div>';
}

document.addEventListener('DOMContentLoaded', function () {
  // ── Permitir entrada directa a una división via ?div=<id> ──
  try {
    const params = new URLSearchParams(window.location.search);
    const divParam = params.get('div');
    if (divParam && DIVISIONS.some(d => d.id === divParam)) {
      activeDiv = divParam;
    }
  } catch (e) {}
  renderTabs();
  loadAllDivisions();
  renderPlantel(activeDiv);
});
</script>
