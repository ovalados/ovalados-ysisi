<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Los Pumas 2026 — Partidos y Resultados | Ovalados</title>
<meta name="description" content="Calendario, resultados y estadísticas de Los Pumas en 2026. Nations Championship, Rugby Championship y tests internacionales.">
<link rel="canonical" href="https://ovalados.com/pumas.html">
<meta property="og:title" content="Los Pumas 2026 — Ovalados">
<meta property="og:description" content="Calendario, resultados y estadísticas de Los Pumas en 2026. Nations Championship, Rugby Championship y tests internacionales.">
<meta property="og:image" content="https://ovalados.com/img/og-pumas.jpg">
<meta property="og:url" content="https://ovalados.com/pumas.html">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="google-site-verification" content="eObn6uPNHec1448XkrJbqhSoKF69bKaJayuLrdOZAj0" />
<link rel="icon" href="img/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="img/favicon.png">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="css/styles.css?v=21">
</head>
<body>
<header class="gold-accent">
  <a href="index.html" class="logo">OVALADOS</a>
  <nav>
    <button class="active" onclick="go('partidos',this)">Partidos</button>
  </nav>
</header>
<div class="sub-header">
  <a href="index.html" class="back-btn">← Torneos</a>
  <span class="sub-label">🇦🇷 LOS PUMAS 2026</span>
</div>
<main class="narrow">
  <section id="partidos" class="section active">
    <div class="page-title">LOS PUMAS</div>
    <div class="page-subtitle">Fixture completo 2026 · Nations Championship + Tests</div>
    <div id="matches-container"></div>
  </section>
</main>
<script>
const fixtures = [
  {
    label: "Nations Championship — Julio (Local)",
    matches: [
      { date:"04/07/2026", time:"16:00", home:"Argentina", away:"Escocia", venue:"Est. Mario A. Kempes, Córdoba", played:false },
      { date:"11/07/2026", time:"16:00", home:"Argentina", away:"Gales", venue:"Est. San Juan del Bicentenario", played:false },
      { date:"18/07/2026", time:"16:00", home:"Argentina", away:"Inglaterra", venue:"Est. Único Madre de Ciudades, Stgo. del Estero", played:false },
    ]
  },
  {
    label: "Tests de Agosto/Septiembre (Local)",
    matches: [
      { date:"08/08/2026", time:"16:00", home:"Argentina", away:"Sudáfrica", venue:"Argentina", played:false },
      { date:"29/08/2026", time:"16:00", home:"Argentina", away:"Australia", venue:"Est. 23 de Agosto, Jujuy", played:false },
      { date:"05/09/2026", time:"18:00", home:"Argentina", away:"Australia", venue:"Malvinas Argentinas, Mendoza", played:false },
    ]
  },
  {
    label: "Nations Championship — Noviembre (Visitante)",
    matches: [
      { date:"07/11/2026", time:"TBD", home:"Irlanda", away:"Argentina", venue:"Irlanda", played:false },
      { date:"14/11/2026", time:"TBD", home:"Italia", away:"Argentina", venue:"Italia", played:false },
      { date:"21/11/2026", time:"TBD", home:"Francia", away:"Argentina", venue:"Francia", played:false },
      { date:"27-29/11/2026", time:"TBD", home:"—", away:"—", venue:"Allianz Stadium, Londres", played:false, label:"Fin de semana de Finales" },
    ]
  },
];

const FLAGS = {
  "Argentina":"🇦🇷","Escocia":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Gales":"🏴󠁧󠁢󠁷󠁬󠁳󠁿","Inglaterra":"🏴󠁧󠁢󠁥󠁮󠁧󠁿",
  "Sudáfrica":"🇿🇦","Australia":"🇦🇺","Irlanda":"🇮🇪","Italia":"🇮🇹","Francia":"🇫🇷","—":"🏆"
};

function renderMatches() {
  const container = document.getElementById('matches-container');
  let html = '';
  fixtures.forEach(block => {
    html += `<div class="round-title">${block.label}</div><div class="matches-grid">`;
    block.matches.forEach(m => {
      const isPumas = (team) => team === "Argentina";
      const homeIsPumas = isPumas(m.home);
      const awayIsPumas = isPumas(m.away);
      let cardClass = 'match-card';
      let statusHtml = '';
      if (m.played) {
        const pumasScore = homeIsPumas ? m.hs : m.as;
        const rivScore   = homeIsPumas ? m.as : m.hs;
        const won = pumasScore > rivScore;
        cardClass += ' played ' + (won ? 'pumas-win' : 'pumas-loss');
        statusHtml = `<div class="match-status ${won?'won':'lost'}">${won?'✓ Victoria':'✗ Derrota'}</div>`;
      } else {
        cardClass += ' upcoming';
        statusHtml = `<div class="match-status upcoming">${m.label || m.time}</div>`;
      }
      if (m.home === "—") {
        html += `<div class="${cardClass}">
          <div class="match-meta"><span class="match-date">${m.date}</span><span class="match-tournament">Nations Championship</span></div>
          <div style="text-align:center;padding:1rem 0;">
            <div style="font-size:2rem">🏆</div>
            <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;color:var(--gold);margin-top:0.5rem">${m.label}</div>
            <div style="font-size:0.78rem;color:var(--muted);margin-top:0.25rem">${m.venue}</div>
          </div>
        </div>`;
        return;
      }
      html += `<div class="${cardClass}">
        <div class="match-meta">
          <span class="match-date">${m.date} · ${m.time}</span>
          <span class="match-venue">${m.venue}</span>
        </div>
        <div class="teams-row">
          <div class="team-block">
            <div class="team-flag">${FLAGS[m.home]||'🏉'}</div>
            <div class="team-name ${homeIsPumas?'pumas':''}">${m.home}</div>
            ${m.played ? `<div class="score">${m.hs}</div>` : ''}
          </div>
          <div class="score-block">
            ${m.played ? `<div class="score-sep">—</div>` : `<div class="vs">VS</div>`}
          </div>
          <div class="team-block">
            <div class="team-flag">${FLAGS[m.away]||'🏉'}</div>
            <div class="team-name ${awayIsPumas?'pumas':''}">${m.away}</div>
            ${m.played ? `<div class="score">${m.as}</div>` : ''}
          </div>
        </div>
        ${statusHtml}
      </div>`;
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

function go(id, btn) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(btn) btn.classList.add('active');
}

renderMatches();
</script>
</body>
</html>
