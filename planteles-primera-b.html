<body>

<div class="sub-header" style="display:flex">
  <a href="index.html" class="back-btn">← Torneos</a>
  <span class="sub-label"><strong>PLANTELES CUSTOM</strong> · Primera B · 2026</span>
</div>

<main>
  <div class="page-title">ARMÁ TU TABLA</div>
  <div class="page-subtitle">Elegí clubes y categorías para comparar puntos acumulados · Primera B 2026</div>

  <div class="filter-block">
    <div class="filter-block-label">Clubes</div>
    <div class="filter-buttons" id="club-btns"></div>
    <div class="filter-actions">
      <button class="filter-action-btn" onclick="selectAll('clubs')">Todos</button>
      <button class="filter-action-btn" onclick="clearAll('clubs')">Ninguno</button>
    </div>
  </div>

  <div class="filter-block">
    <div class="filter-block-label">Categorías</div>
    <div class="filter-buttons" id="div-btns"></div>
    <div class="filter-actions">
      <button class="filter-action-btn" onclick="selectAll('divs')">Todas</button>
      <button class="filter-action-btn" onclick="clearAll('divs')">Ninguna</button>
    </div>
  </div>

  <div class="table-wrap">
    <table id="result-table" style="display:none">
      <thead id="result-thead"></thead>
      <tbody id="result-body"></tbody>
    </table>
    <div class="empty-state" id="empty-state">Seleccioná al menos un club y una categoría</div>
  </div>
</main>

<script>
const DIVS = [
  { key:'sup',  label:'Superior',  url:'data/urba-primera-b.json',       sfx:null },
  { key:'int',  label:'Intermedia',url:'data/primera-b-intermedia.json',  sfx:null },
  { key:'prea', label:'Pre-A',     url:'data/primera-b-preinter-a.json',  sfx:null },
  { key:'preb', label:'Pre-B',     url:'data/primera-b-preinter-b.json',  sfx:' B' },
];

const tally = {};
let clubOrder = [];

const selClubs = new Set();
const selDivs  = new Set(DIVS.map(d => d.key));

function calcPts(data, sfx) {
  const pts = {};
  (data.teams || []).forEach(t => { if (t.name !== 'Bye') pts[t.name] = 0; });
  Object.values(data.matches || {}).forEach(rd => {
    (rd.ms || []).forEach(m => {
      if (!m.played || m.home === 'Bye' || m.away === 'Bye') return;
      if (!(m.home in pts) || !(m.away in pts)) return;
      const diff = m.hs - m.as;
      if (diff > 0)      { pts[m.home] += 4; if (diff <= 7) pts[m.away]++; }
      else if (diff < 0) { pts[m.away] += 4; if (-diff <= 7) pts[m.home]++; }
      else               { pts[m.home] += 2; pts[m.away] += 2; }
      if (m.bp_home) pts[m.home]++;
      if (m.bp_away) pts[m.away]++;
    });
  });
  const base = {};
  Object.entries(pts).forEach(([name, p]) => {
    const b = sfx && name.endsWith(sfx) ? name.slice(0, -sfx.length).trim() : name;
    base[b] = (base[b] || 0) + p;
  });
  return base;
}

function renderClubBtns() {
  document.getElementById('club-btns').innerHTML = clubOrder.map(c => `
    <button class="filter-btn ${selClubs.has(c)?'active':''}" onclick="toggleClub('${c.replace(/'/g,"\\'")}')">
      ${c}
    </button>`).join('');
}

function renderDivBtns() {
  document.getElementById('div-btns').innerHTML = DIVS.map(d => `
    <button class="filter-btn ${selDivs.has(d.key)?'active':''}" onclick="toggleDiv('${d.key}')">
      ${d.label}
    </button>`).join('');
}

function renderTable() {
  const activeDivs = DIVS.filter(d => selDivs.has(d.key));
  const activeClubs = clubOrder.filter(c => selClubs.has(c));
  const table = document.getElementById('result-table');
  const empty = document.getElementById('empty-state');

  if (!activeDivs.length || !activeClubs.length) {
    table.style.display = 'none';
    empty.style.display = 'block';
    empty.textContent = !activeClubs.length ? 'Seleccioná al menos un club' : 'Seleccioná al menos una categoría';
    return;
  }

  table.style.display = '';
  empty.style.display = 'none';

  document.getElementById('result-thead').innerHTML = `<tr>
    <th style="width:40px">#</th>
    <th style="text-align:left">CLUB</th>
    <th>TOTAL</th>
    ${activeDivs.map(d => `<th>${d.label.toUpperCase()}</th>`).join('')}
  </tr>`;

  const rows = activeClubs.map(c => {
    const divPts = {};
    activeDivs.forEach(d => { divPts[d.key] = tally[c]?.[d.key] || 0; });
    const total = Object.values(divPts).reduce((s,v)=>s+v,0);
    return { club:c, total, divPts };
  }).sort((a,b) => b.total - a.total);

  document.getElementById('result-body').innerHTML = rows.map((r,i) => `<tr>
    <td><span class="pos-num">${i+1}</span></td>
    <td style="text-align:left;font-weight:600;padding-left:4px">${r.club}</td>
    <td style="color:var(--green);font-weight:700">${r.total}</td>
    ${activeDivs.map(d => `<td>${r.divPts[d.key]}</td>`).join('')}
  </tr>`).join('');
}

function toggleClub(c) {
  if (selClubs.has(c)) selClubs.delete(c); else selClubs.add(c);
  renderClubBtns();
  renderTable();
}

function toggleDiv(k) {
  if (selDivs.has(k)) selDivs.delete(k); else selDivs.add(k);
  renderDivBtns();
  renderTable();
}

function selectAll(type) {
  if (type === 'clubs') { clubOrder.forEach(c => selClubs.add(c)); renderClubBtns(); }
  else { DIVS.forEach(d => selDivs.add(d.key)); renderDivBtns(); }
  renderTable();
}

function clearAll(type) {
  if (type === 'clubs') { selClubs.clear(); renderClubBtns(); }
  else { selDivs.clear(); renderDivBtns(); }
  renderTable();
}

Promise.all(DIVS.map(d =>
  fetch(d.url + '?v=' + Date.now()).then(r => r.json()).catch(() => ({ teams:[], matches:{} }))
)).then(results => {
  clubOrder = (results[0].teams || []).filter(t => t.name !== 'Bye').map(t => t.name);
  clubOrder.forEach(c => { tally[c] = {}; DIVS.forEach(d => tally[c][d.key] = 0); });

  DIVS.forEach((d, i) => {
    const pts = calcPts(results[i], d.sfx);
    Object.entries(pts).forEach(([base, p]) => {
      if (tally[base]) tally[base][d.key] += p;
    });
  });

  clubOrder.forEach(c => selClubs.add(c));
  renderClubBtns();
  renderDivBtns();
  renderTable();
});
</script>
