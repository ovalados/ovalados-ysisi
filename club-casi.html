<script>
const CLUB_NAME = "CASI";

// normalización: lowercase, sin tildes, sin símbolos
function norm(str) {
  return (str || "")
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, ' ')
    .trim();
}
const CLUB_KEY = norm(CLUB_NAME);

// ── FETCH DATOS TABLA + FIXTURE ─────────────────────────
function loadData() {
  fetch('data/urba.json?v=' + Date.now())
    .then(r => r.json())
    .then(data => {
      const teams   = data.teams   || [];
      const matches = data.matches || {};
      renderPosicion(teams);
      renderPartidos(matches);
      if (data.lastUpdate) {
        const d  = new Date(data.lastUpdate);
        const el = document.getElementById('last-update');
        if (el) el.textContent = '✓ Actualizado: ' + d.toLocaleString('es-AR',{day:'2-digit',month:'numeric',hour:'2-digit',minute:'2-digit'});
      }
    })
    .catch(e => {
      console.log('Error al cargar la tabla:', e);
      document.getElementById('pos-card').innerHTML =
        '<div class="empty-state">No se pudieron cargar los datos.</div>';
    });
}

// ── POSICION EN TABLA ───────────────────────────────────
function renderPosicion(teams) {
  if (!teams.length) {
    document.getElementById('pos-card').innerHTML =
      '<div class="empty-state">Sin datos de tabla aún.</div>';
    return;
  }
  const allZero = teams.every(t => t.pts === 0 && t.pj === 0);
  const sorted = [...teams].sort((a, b) => {
    if (allZero) return a.name.localeCompare(b.name, 'es');
    return b.pts - a.pts || (b.pf - b.pc) - (a.pf - a.pc);
  });
  const idx = sorted.findIndex(t => norm(t.name) === CLUB_KEY);
  if (idx === -1) {
    document.getElementById('pos-card').innerHTML =
      '<div class="empty-state">' + CLUB_NAME + ' aún no figura en la tabla.</div>';
    return;
  }
  const t = sorted[idx];
  const pos = idx + 1;
  const diff = (t.pf || 0) - (t.pc || 0);
  const diffClass = diff > 0 ? 'green' : diff < 0 ? 'red' : '';
  const diffStr   = (diff > 0 ? '+' : '') + (diff || 0);
  const formDots  = (t.form || []).map(f =>
    '<div class="dot ' + (f === 'w' ? 'w' : f === 'l' ? 'l' : 'd') + '"></div>').join('');

  document.getElementById('pos-card').innerHTML = `
    <div class="pos-card">
      <div class="pos-pos-big">
        <div class="big">${allZero ? '—' : pos + '°'}</div>
        <div class="lbl">Posición</div>
      </div>
      <div class="pos-stat"><div class="pos-stat-label">Pts</div><div class="pos-stat-val green">${t.pts || 0}</div></div>
      <div class="pos-stat"><div class="pos-stat-label">PJ</div><div class="pos-stat-val">${t.pj || 0}</div></div>
      <div class="pos-stat"><div class="pos-stat-label">G</div><div class="pos-stat-val">${t.g || 0}</div></div>
      <div class="pos-stat"><div class="pos-stat-label">E</div><div class="pos-stat-val">${t.e || 0}</div></div>
      <div class="pos-stat"><div class="pos-stat-label">P</div><div class="pos-stat-val">${t.p || 0}</div></div>
      <div class="pos-stat"><div class="pos-stat-label">PF</div><div class="pos-stat-val">${t.pf || 0}</div></div>
      <div class="pos-stat"><div class="pos-stat-label">PC</div><div class="pos-stat-val">${t.pc || 0}</div></div>
      <div class="pos-stat"><div class="pos-stat-label">+/-</div><div class="pos-stat-val ${diffClass}">${diffStr}</div></div>
      <div class="pos-stat"><div class="pos-stat-label">BP</div><div class="pos-stat-val gold">${t.bp || 0}</div></div>
      <div class="pos-stat"><div class="pos-stat-label">BF</div><div class="pos-stat-val">${t.bf || 0}</div></div>
      <div class="pos-stat" style="min-width:90px">
        <div class="pos-stat-label">Forma</div>
        <div class="form-dots" style="justify-content:center;padding-top:4px">${formDots || '<span style="color:var(--muted);font-size:0.75rem">—</span>'}</div>
      </div>
    </div>`;
}

// ── PARTIDOS JUGADOS + PROXIMOS ─────────────────────────
function renderPartidos(matches) {
  const jugados = [], proximos = [];
  Object.entries(matches).forEach(([rnd, rd]) => {
    (rd.ms || []).forEach(m => {
      const homeIsClub = norm(m.home) === CLUB_KEY;
      const awayIsClub = norm(m.away) === CLUB_KEY;
      if (!homeIsClub && !awayIsClub) return;
      const rival     = homeIsClub ? m.away : m.home;
      const condicion = homeIsClub ? 'Local' : 'Visitante';
      if (m.played) {
        const ptsPropio = homeIsClub ? m.hs : m.as;
        const ptsRival  = homeIsClub ? m.as : m.hs;
        const res = ptsPropio > ptsRival ? 'w' : ptsPropio < ptsRival ? 'l' : 'd';
        jugados.push({ rnd: +rnd, rival, condicion, ptsPropio, ptsRival, res, date: rd.date });
      } else {
        proximos.push({ rnd: +rnd, rival, condicion, date: rd.date });
      }
    });
  });
  jugados.sort((a, b) => a.rnd - b.rnd);
  proximos.sort((a, b) => a.rnd - b.rnd);

  const jugEl = document.getElementById('partidos-jugados');
  if (!jugados.length) {
    jugEl.innerHTML = '<div class="empty-state">Sin partidos jugados aún.</div>';
  } else {
    jugEl.innerHTML = jugados.slice(-5).reverse().map(p => {
      const resLetter = p.res === 'w' ? 'G' : p.res === 'l' ? 'P' : 'E';
      return `<div class="match-row">
        <div class="match-row-left">
          <div class="match-result ${p.res}">${resLetter}</div>
          <div class="match-rival"><span class="cond">${p.condicion}</span>vs <strong>${p.rival}</strong></div>
        </div>
        <div class="match-score">${p.ptsPropio} — ${p.ptsRival}</div>
        <div class="match-fecha">F${p.rnd}${p.date ? ' · ' + p.date : ''}</div>
      </div>`;
    }).join('');
  }

  const proxEl = document.getElementById('proximos-partidos');
  if (!proximos.length) {
    proxEl.innerHTML = '<div class="empty-state">No hay próximos partidos cargados.</div>';
  } else {
    proxEl.innerHTML = proximos.slice(0, 5).map(p => `
      <div class="match-row">
        <div class="match-row-left">
          <div class="match-rival"><span class="cond">${p.condicion}</span>vs <strong>${p.rival}</strong></div>
        </div>
        <div class="match-score upcoming">VS</div>
        <div class="match-fecha">F${p.rnd}${p.date ? ' · ' + p.date : ''}</div>
      </div>`).join('');
  }
}

// ── PLANTEL (desde data.js PARTIDOS.top14) ──────────────
function renderPlantel() {
  const el = document.getElementById('plantel');
  if (typeof PARTIDOS === 'undefined' || !PARTIDOS.top14) {
    el.innerHTML = '<div class="empty-state">Sin formaciones cargadas.</div>';
    return;
  }
  const byPos = {};
  Object.values(PARTIDOS.top14).forEach(partido => {
    ['local', 'visitante'].forEach(side => {
      const team = partido[side];
      if (!team || norm(team.nombre) !== CLUB_KEY) return;
      [...(team.jugadores || []), ...(team.cambios || [])].forEach(j => {
        const m = j.match(/^(\d+)\.\s*(.+)/);
        if (m) {
          const pos  = parseInt(m[1], 10);
          const name = m[2].trim();
          if (!byPos[pos]) byPos[pos] = new Set();
          byPos[pos].add(name);
        }
      });
    });
  });
  const posKeys = Object.keys(byPos).map(Number).sort((a, b) => a - b);
  if (!posKeys.length) {
    el.innerHTML = '<div class="empty-state">Sin jugadores registrados para ' + CLUB_NAME + ' este 2026.</div>';
    return;
  }
  const rows = [];
  posKeys.forEach(p => {
    Array.from(byPos[p]).forEach(name => {
      rows.push(`<div class="plantel-row"><span class="plantel-num">${p}</span><span class="plantel-name">${name}</span></div>`);
    });
  });
  el.innerHTML = '<div class="plantel-grid">' + rows.join('') + '</div>';
}

document.addEventListener('DOMContentLoaded', function () {
  loadData();
  renderPlantel();
});
</script>
